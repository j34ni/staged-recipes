{% set name = "shs-cxi-drivers" %}
{% set version = "1.0.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  git_url: https://github.com/HewlettPackard/shs-cxi-driver.git
  git_rev: release/shs-12.0.1 

build:
  number: 0
  noarch: generic  # Headers only

requirements:
  build:
    - git

test:
  commands:
    - test -f $PREFIX/include/linux/cxi.h 
    - test -f $PREFIX/include/uapi/misc/cxi.h 

about:
  home: https://github.com/HewlettPackard/shs-cxi-driver
  license: GPL-2.0-or-later
  license_file: COPYING
  summary: 'Headers for CXI drivers'
  description: |
    Provides UAPI headers for CXI (Cassini eXtended Interface) drivers.
    Licensed under GPL-2.0-or-later as per COPYING file and cray-cxi-driver.spec.
  dev_url: https://github.com/HewlettPackard/shs-cxi-driver

extra:
  recipe-maintainers:
    - j34ni
